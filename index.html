<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Search App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Light mode (default) */
            --bg-color: #ffffff;
            --accent-color: #52bfbf;
            --text-main: #0c0b09;
            --text-muted: #635c50;
            --card-bg: #fcfcfc;
            --border-color: #c0c0b9;
            --shadow-color: rgba(173, 64, 64, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark mode */
                --bg-color: #030712;
                --accent-color: #52bfbf;
                --text-main: #f3f4f6;
                --text-muted: #9ca3af;
                --card-bg: #030712;
                --border-color: #3f3f46;
                --shadow-color: rgba(82, 191, 191, 0.2);
            }
        }

        html[data-theme="light"] {
            --bg-color: #ffffff;
            --accent-color: #52bfbf;
            --text-main: #0c0b09;
            --text-muted: #635c50;
            --card-bg: #fcfcfc;
            --border-color: #c0c0b9;
            --shadow-color: rgba(173, 64, 64, 0.2);
        }

        html[data-theme="dark"] {
            --bg-color: #030712;
            --accent-color: #52bfbf;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-bg: #030712;
            --border-color: #3f3f46;
            --shadow-color: rgba(82, 191, 191, 0.2);
        }

        body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.5;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin: 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 24px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        input[type="text"]::placeholder {
            color: var(--accent-color);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--shadow-color);
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Space between list items */
        }

        li {
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: border-color 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
        }

        li:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            transition: border-color 0.2s ease;
        }

        .empty-state:hover {
            border-color: var(--border-color);
            transform: none;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Claimed as affected in Canvas hack</h1>
    </div>

    <input type="text" id="searchInput" placeholder="Type to search...">
    <ul id="resultsList"></ul>

    <script>
        // Theme management
        const html = document.documentElement;

        // Initialize theme from localStorage or system preference
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            applyTheme(theme);
        }

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });

        initTheme();

        // JSON search functionality
        let dataList = [];
        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');

        fetch('./affected.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                dataList = data;
                renderList(dataList);
            })
            .catch(error => {
                console.error('Error loading JSON:', error);
                resultsList.innerHTML = `<li class="empty-state">Error loading data.json.<br>Make sure you are running a local web server.</li>`;
            });

        searchInput.addEventListener('input', (event) => {
            const searchTerm = event.target.value.toLowerCase();

            const filteredData = dataList.filter(item =>
                item.toLowerCase().includes(searchTerm)
            );

            renderList(filteredData);
        });

        function renderList(items) {
            resultsList.innerHTML = '';

            if (items.length === 0) {
                resultsList.innerHTML = '<li class="empty-state">No matching results found.</li>';
                return;
            }

            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                resultsList.appendChild(li);
            });
        }
    </script>
</body>

</html>
