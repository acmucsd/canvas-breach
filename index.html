<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Search App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #171717;
            --accent-color: #52bfbf;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-bg: #242424;
            --border-color: #3f3f46;
        }

        body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.5;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 24px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]::placeholder {
            color: var(--accent-color);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(82, 191, 191, 0.2);
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Space between list items */
        }

        li {
            padding: 14px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        li:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
        }
        
        .empty-state:hover {
            border-color: var(--border-color);
            transform: none;
        }
    </style>
</head>
<body>

    <input type="text" id="searchInput" placeholder="Type to search...">
    <ul id="resultsList"></ul>

    <script>
        let dataList = [];
        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');

        fetch('./affected.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                dataList = data;
                renderList(dataList);
            })
            .catch(error => {
                console.error('Error loading JSON:', error);
                resultsList.innerHTML = `<li class="empty-state">Error loading data.json.<br>Make sure you are running a local web server.</li>`;
            });

        searchInput.addEventListener('input', (event) => {
            const searchTerm = event.target.value.toLowerCase();
            
            const filteredData = dataList.filter(item => 
                item.toLowerCase().includes(searchTerm)
            );
            
            renderList(filteredData);
        });

        function renderList(items) {
            resultsList.innerHTML = '';

            if (items.length === 0) {
                resultsList.innerHTML = '<li class="empty-state">No matching results found.</li>';
                return;
            }

            items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                resultsList.appendChild(li);
            });
        }
    </script>
</body>
</html>
